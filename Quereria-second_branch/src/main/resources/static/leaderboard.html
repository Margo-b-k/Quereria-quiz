<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Квиз — таблица лидеров</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;500;600&family=Rufina:wght@700&display=swap" rel="stylesheet">

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat Alternates', sans-serif;
}

body {
    background:#7a003c;
    padding:40px;
    min-height:100vh;
}

/* HEADER */
.header {
    display:flex;
    justify-content:space-between;
    margin-bottom:30px;
}
.logo {
    font-family:'Rufina', serif;
    font-size:42px;
}
.profile {
    width:60px;
    height:60px;
    border-radius:50%;
    background:#e9dc6a;
}

/* CARD */
.leaderboard-container {
    max-width:750px;
    margin:auto;
    background:#f1f1f1;
    border-radius:30px;
    padding:40px;
    text-align:center;
}

/* TITLES */
.leaderboard-title {
    font-size:32px;
    font-weight:700;
    margin-bottom:10px;
}

.subtitle {
    font-size:22px;
    margin-bottom:20px;
    position:relative;
}

.subtitle::after {
    content:"";
    display:block;
    height:2px;
    background:#ccc;
    width:80%;
    margin:10px auto;
}

/* LIST */
.leaderboard-list {
    background:#e3e3e3;
    border-radius:25px;
    padding:20px;
}

/* ITEM */
.leaderboard-item {
    display:flex;
    align-items:center;
    padding:15px;
    border-radius:20px;
    margin-bottom:10px;
}

.leaderboard-item.first {
    background:#dcdcdc;
}

/* RANK */
.rank-number {
    width:30px;
    text-align:center;
}

/* AVATAR */
.avatar {
    width:30px;
    height:30px;
    border-radius:50%;
    margin:0 15px;
}

.avatar.purple { background:#800040; }
.avatar.blue { background:#2d4ed8; }
.avatar.green { background:#a4c639; }

/* NAME */
.rank-name {
    flex:1;
    text-align:left;
    font-size:18px;
}

/* SCORE */
.rank-score {
    font-size:18px;
}

/* BUTTONS */
.buttons {
    display:flex;
    justify-content:space-between;
    margin-top:30px;
}

.btn {
    flex:1;
    margin:0 10px;
    padding:12px;
    border-radius:30px;
    border:none;
    color:white;
    font-weight:600;
    cursor:pointer;
    background:#800040;
    transition:0.3s;
}

.btn:hover {
    transform:translateY(-3px);
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">Q</div>
    <div class="profile"></div>
</div>

<div class="leaderboard-container">
    <h1 class="leaderboard-title">Исторический батл</h1>
    <div class="subtitle">Таблица лидеров</div>

    <div class="leaderboard-list" id="leaderboardList"></div>

    <div class="buttons">
        <button class="btn">Поделиться</button>
        <button class="btn">Выход</button>
    </div>
</div>

<script>
// ДАННЫЕ
const leaderboardData = [
    { name: "МурМур (Я)", score: 30 },
    { name: "Ягуар", score: 20 },
    { name: "Панда", score: 0 }
];

const colors = ["purple", "blue", "green"];
const leaderboardList = document.getElementById('leaderboardList');

// СОРТИРОВКА
leaderboardData.sort((a,b)=>b.score-a.score);

// РЕНДЕР
leaderboardData.forEach((player,index)=>{
    const div = document.createElement('div');
    div.className = 'leaderboard-item';
    if(index===0) div.classList.add('first');

    div.innerHTML = `
        <span class="rank-number">${index+1}</span>
        <div class="avatar ${colors[index % colors.length]}"></div>
        <span class="rank-name">${player.name}</span>
        <span class="rank-score">${player.score}</span>
    `;

    leaderboardList.appendChild(div);
});
</script>
<script type="module" src="js/header.js"></script>
</body>
</html>
