<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Исторический квиз</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;500;600&family=Rufina:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat Alternates', sans-serif;
        }

        body {
            background: #eeeeee;
            padding: 30px 60px;
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
        }

        .left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            font-family: 'Rufina', serif;
            font-size: 42px;
        }

        .profile {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #e9dc6a;
        }

        /* TIMER AREA */
        .timer-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 120px;
        }

        .timer {
            position: relative;
            width: 420px;
            height: 420px;
        }

        .timer svg {
            transform: rotate(-90deg);
        }

        .timer circle {
            fill: none;
            stroke-width: 18;
            stroke-linecap: round;
        }

        .bg {
            stroke: #e0e0e0;
        }

        .progress {
            stroke: url(#grad);
            stroke-dasharray: 1130;
            stroke-dashoffset: 0;
            animation: countdown 3s linear forwards;
        }

        @keyframes countdown {
            from { stroke-dashoffset: 0; }
            to { stroke-dashoffset: 1130; }
        }

        .number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 110px;
            font-weight: 600;
        }

        /* QUESTION PAGE */
        .question-container {
            max-width: 900px;
            margin: 20px auto 40px;
            background: white;
            border-radius: 60px;
            padding: 50px 60px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .question-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .question-number {
            font-size: 42px;
            font-weight: 600;
            background: linear-gradient(135deg, #E9DC6A, #A24B58, #700143);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .timer-large {
            font-size: 36px;
            font-weight: 700;
            color: #700143;
            background: #f8f8f8;
            padding: 15px 40px;
            border-radius: 60px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 2px solid #e9dc6a;
        }

        .question-title {
            font-size: 36px;
            font-weight: 600;
            margin-bottom: 40px;
            color: #333;
            line-height: 1.4;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 25px 30px;
            background: #f8f8f8;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            position: relative;
        }

        .option:hover {
            background: #f0f0f0;
            transform: translateX(10px);
        }

        .option.selected {
            background: linear-gradient(135deg, #fff2d0 0%, #ffd5c0 100%);
            border-color: #e9dc6a;
            box-shadow: 0 10px 20px rgba(233, 220, 106, 0.2);
        }

        .option.correct {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            border-color: #28a745;
        }

        .option.incorrect {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            border-color: #dc3545;
        }

        .option input[type="radio"] {
            width: 24px;
            height: 24px;
            margin-right: 20px;
            cursor: pointer;
            accent-color: #A24B58;
        }

        .option-text {
            font-size: 24px;
            color: #333;
            font-weight: 500;
        }

        .check-mark {
            position: absolute;
            right: 30px;
            font-size: 28px;
            color: #A24B58;
            display: none;
        }

        .option.selected .check-mark {
            display: block;
        }

        .submit-btn {
            background: linear-gradient(135deg, #E9DC6A 0%, #A24B58 50%, #700143 100%);
            color: white;
            border: none;
            padding: 20px 50px;
            font-size: 24px;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            width: 100%;
            letter-spacing: 1px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 20px 30px rgba(162, 75, 88, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* RATING PAGE */
        .rating-container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            border-radius: 60px;
            padding: 50px 60px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
        }

        .rating-title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #E9DC6A, #A24B58, #700143);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .correct-answer-section {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 40px;
            padding: 30px;
            margin-bottom: 40px;
            border: 2px solid #e9dc6a;
        }

        .correct-answer-label {
            font-size: 24px;
            color: #666;
            margin-bottom: 10px;
        }

        .correct-answer-value {
            font-size: 48px;
            font-weight: 700;
            color: #700143;
        }

        .leaderboard-title {
            font-size: 36px;
            font-weight: 600;
            margin-bottom: 30px;
            color: #333;
        }

        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 30px;
            background: #f8f8f8;
            border-radius: 50px;
            font-size: 24px;
            font-weight: 500;
            transition: transform 0.3s ease;
        }

        .leaderboard-item:hover {
            transform: translateX(10px);
            background: #f0f0f0;
        }

        .leaderboard-item.first {
            background: linear-gradient(135deg, #fff2d0 0%, #ffd5c0 100%);
            border: 2px solid #e9dc6a;
        }

        .rank {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .rank-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #700143;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .rank-name {
            font-size: 24px;
        }

        .rank-score {
            font-size: 28px;
            font-weight: 700;
            color: #700143;
        }

        .play-again-btn {
            margin-top: 40px;
            background: linear-gradient(135deg, #E9DC6A 0%, #A24B58 50%, #700143 100%);
            color: white;
            border: none;
            padding: 20px 50px;
            font-size: 24px;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            width: 100%;
        }

        .play-again-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 30px rgba(162, 75, 88, 0.3);
        }

        /* Timer page hide/show */
        .timer-page {
            display: block;
        }

        .question-page {
            display: none;
        }

        .rating-page {
            display: none;
        }

        @media (max-width: 768px) {
            body {
                padding: 20px;
            }
            
            .question-container, .rating-container {
                padding: 30px;
                border-radius: 40px;
            }
            
            .question-title {
                font-size: 24px;
            }
            
            .option {
                padding: 20px;
            }
            
            .option-text {
                font-size: 18px;
            }
            
            .submit-btn {
                font-size: 20px;
                padding: 15px 30px;
            }
            
            .timer-large {
                font-size: 24px;
                padding: 10px 20px;
            }
            
            .rating-title {
                font-size: 36px;
            }
            
            .correct-answer-value {
                font-size: 32px;
            }
            
            .leaderboard-item {
                font-size: 18px;
                padding: 15px 20px;
            }
        }
    </style>
</head>
<body>
    <!-- TIMER PAGE -->
    <div class="timer-page" id="timerPage">
        <div class="header">
            <div class="left">
                <div class="logo" id="logoBtn" style="cursor:pointer;">Q</div>
            </div>
            <div class="profile"></div>
        </div>

        <div class="timer-container">
            <div class="timer">
                <svg width="420" height="420">
                    <defs>
                        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#E9DC6A"/>
                            <stop offset="50%" stop-color="#A24B58"/>
                            <stop offset="100%" stop-color="#700143"/>
                        </linearGradient>
                    </defs>
                    <circle class="bg" cx="210" cy="210" r="180"></circle>
                    <circle class="progress" cx="210" cy="210" r="180"></circle>
                </svg>
                <div class="number" id="timerNumber">3</div>
            </div>
        </div>
    </div>

    <!-- QUESTION PAGE -->
    <div class="question-page" id="questionPage">
        <div class="header">
            <div class="left">
                <div class="logo">Q</div>
            </div>
            <div class="profile"></div>
        </div>

        <div class="question-container">
            <div class="question-header">
                <span class="question-number">Вопрос 1</span>
                <span class="timer-large" id="questionTimer">15с</span>
            </div>

            <h2 class="question-title">Кто был первым римским императором?</h2>

            <div class="options-grid" id="optionsList"></div>

            <button class="submit-btn" id="submitBtn">Проверить ответ</button>
        </div>
    </div>

    <!-- RATING PAGE -->
    <div class="rating-page" id="ratingPage">
        <div class="header">
            <div class="left">
                <div class="logo">Q</div>
            </div>
            <div class="profile"></div>
        </div>
        <!-- Подтягивается из введенной информации о квизе -->
        <div class="rating-container">
            <h1 class="rating-title">Результаты квиза</h1>

            <div class="correct-answer-section">
                <div class="correct-answer-label">Ваш результат:</div>
                <div class="correct-answer-value">0%</div>
            </div>

            <h2 class="leaderboard-title">Рейтинг игроков</h2>
            <div class="leaderboard-list"></div>

            <h2 class="leaderboard-title" style="margin-top: 35px;">Баллы за ответы</h2>
            <div class="leaderboard-list" id="answerDetailsList"></div>
    </div>
    <script>
        const timerPage = document.getElementById('timerPage');
        const questionPage = document.getElementById('questionPage');
        const ratingPage = document.getElementById('ratingPage');

        const timerNumber = document.getElementById('timerNumber');
        const questionTimer = document.getElementById('questionTimer');
        const submitBtn = document.getElementById('submitBtn');

        const urlParams = new URLSearchParams(window.location.search);
        const quizId = urlParams.get("quizId");

        let quizData = null;
        let currentQuestionIndex = 0;
        let currentQuestion = null;
        let questionTimerInterval = null;
        let collectedAnswers = [];

        let currentPlayer = JSON.parse(localStorage.getItem(`quizCurrentPlayer_${quizId}`) || 'null');
    const quizMeta = JSON.parse(localStorage.getItem(`quizMeta_${quizId}`) || 'null');

    function getLeaderboard() {
        return JSON.parse(localStorage.getItem(`quizLeaderboard_${quizId}`) || '[]');
    }

    function saveLeaderboard(data) {
        localStorage.setItem(`quizLeaderboard_${quizId}`, JSON.stringify(data));
    }
    async function fillCurrentPlayerFromSession() {
    if (currentPlayer?.name) {
        return;
    }

    try {
        const response = await fetch('/api/auth/me', {
            method: 'GET',
            credentials: 'include'
        });

        if (!response.ok) {
            return;
        }

        const user = await response.json();

        currentPlayer = {
            name: user.name,
            userId: user.id,
            email: user.email
        };

        localStorage.setItem(`quizCurrentPlayer_${quizId}`, JSON.stringify(currentPlayer));
    } catch (e) {
        console.error('Не удалось получить пользователя из сессии', e);
    }
}

    function upsertCurrentPlayerScore(result) {
        const playerName = currentPlayer?.name || 'Игрок';
        const correctCount = Array.isArray(result.results)
            ? result.results.filter(item => item.correct).length
            : 0;

        const totalPoints = correctCount * 10;

        let leaderboard = getLeaderboard();
        const existingIndex = leaderboard.findIndex(player => {
        if (currentPlayer?.userId && player.userId) {
            return player.userId === currentPlayer.userId;
        }
        return player.name === playerName;
    });

        const playerData = {
            name: playerName,
            userId: currentPlayer?.userId ?? null,
            score: totalPoints,
            percent: result.scorePercent ?? 0
        };

        if (existingIndex >= 0) {
            leaderboard[existingIndex] = playerData;
        } else {
            leaderboard.push(playerData);
        }

        leaderboard.sort((a, b) => b.score - a.score);
        saveLeaderboard(leaderboard);

        return leaderboard;
    }

        if (!quizId) {
            alert("quizId не найден в URL");
            window.location.href = "index.html";
        }

    async function loadQuiz() {
        try {
            await fillCurrentPlayerFromSession();

            const response = await fetch(`/api/quizzes/${quizId}/play`, {
                method: "GET",
                credentials: "include"
            });

            if (!response.ok) {
                throw new Error("Не удалось загрузить квиз");
            }

            quizData = await response.json();

            if (!quizData.questions || !quizData.questions.length) {
                throw new Error("В квизе нет вопросов");
            }

            currentQuestionIndex = 0;
            currentQuestion = quizData.questions[currentQuestionIndex];
            renderQuestion(currentQuestion);
            startIntroTimer();
        } catch (error) {
            console.error(error);
            alert("Ошибка загрузки квиза");
        }
    }

        function startIntroTimer() {
            let timeLeft = 3;
            timerNumber.textContent = timeLeft;

            const countdownInterval = setInterval(() => {
                timeLeft--;
                timerNumber.textContent = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    timerPage.style.display = 'none';
                    questionPage.style.display = 'block';
                    startQuestionTimer();
                }
            }, 1000);
        }

        function startQuestionTimer() {
            const seconds = currentQuestion.timerSeconds ?? 0;

            if (!seconds || seconds <= 0) {
                questionTimer.textContent = "Без лимита";
                return;
            }

            let timeLeft = seconds;
            questionTimer.textContent = `${timeLeft}с`;

            questionTimerInterval = setInterval(() => {
                timeLeft--;
                questionTimer.textContent = `${timeLeft}с`;

                if (timeLeft <= 0) {
                    clearInterval(questionTimerInterval);
                    submitCurrentAnswer();
                }
            }, 1000);
        }

        function renderQuestion(question) {
            const questionNumberEl = document.querySelector('.question-number');
            const questionTitleEl = document.querySelector('.question-title');
            const optionsListEl = document.getElementById('optionsList');

            questionNumberEl.textContent = `Вопрос ${question.number}`;
            questionTitleEl.textContent = question.text;
            optionsListEl.innerHTML = "";
            submitBtn.disabled = false;

            if (question.type === "CHOICE") {
                question.answers.forEach(answer => {
                    const label = document.createElement("label");
                    label.className = "option";
                    label.innerHTML = `
                        <input type="radio" name="answer" value="${answer.id}">
                        <span class="option-text">${answer.text}</span>
                        <span class="check-mark">✓</span>
                    `;

                    label.addEventListener("click", () => {
                        const radio = label.querySelector('input[type="radio"]');
                        radio.checked = true;

                        document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
                        label.classList.add('selected');
                    });

                    optionsListEl.appendChild(label);
                });
            } else if (question.type === "OPEN") {
                optionsListEl.innerHTML = `
                    <input
                        type="text"
                        id="openAnswerInput"
                        placeholder="Введите ответ"
                        style="width:100%; padding:20px; border-radius:30px; border:2px solid #ddd; font-size:20px;"
                    >
                `;
            }
        }

            async function submitCurrentAnswer() {
        submitBtn.disabled = true;

        if (questionTimerInterval) {
            clearInterval(questionTimerInterval);
        }

        const answerPayload = {
            questionId: currentQuestion.id
        };

        if (currentQuestion.type === "CHOICE") {
            const selected = document.querySelector('input[name="answer"]:checked');
            answerPayload.selectedAnswerId = selected ? Number(selected.value) : null;
        }

        if (currentQuestion.type === "OPEN") {
            const input = document.getElementById("openAnswerInput");
            answerPayload.textAnswer = input ? input.value.trim() : "";
        }

        const existingIndex = collectedAnswers.findIndex(a => a.questionId === currentQuestion.id);
        if (existingIndex >= 0) {
            collectedAnswers[existingIndex] = answerPayload;
        } else {
            collectedAnswers.push(answerPayload);
        }

        const nextIndex = currentQuestionIndex + 1;

        if (nextIndex < quizData.questions.length) {
            currentQuestionIndex = nextIndex;
            currentQuestion = quizData.questions[currentQuestionIndex];
            renderQuestion(currentQuestion);
            submitBtn.disabled = false;
            startQuestionTimer();
            return;
        }

        try {
            const response = await fetch(`/api/quizzes/${quizId}/submit`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                credentials: "include",
                body: JSON.stringify({
                    answers: collectedAnswers
                })
            });

            if (!response.ok) {
                throw new Error("Не удалось отправить ответы");
            }

            const result = await response.json();
            showResult(result);
        } catch (error) {
            console.error(error);
            alert("Ошибка при отправке ответов");
            submitBtn.disabled = false;
        }
    }

    function showResult(result) {
        questionPage.style.display = 'none';
        ratingPage.style.display = 'block';

        const ratingTitle = document.querySelector('.rating-title');
        const correctAnswerLabel = document.querySelector('.correct-answer-label');
        const correctAnswerValue = document.querySelector('.correct-answer-value');
        const leaderboardList = document.querySelector('.leaderboard-list');
        const answerDetailsList = document.getElementById('answerDetailsList');

        const leaderboard = upsertCurrentPlayerScore(result);

        if (ratingTitle) {
            ratingTitle.textContent = quizMeta?.title || quizData.title || "Результаты квиза";
        }

        if (correctAnswerLabel) {
            correctAnswerLabel.textContent = `Ваш результат (${currentPlayer?.name || 'Игрок'}):`;
        }

        if (correctAnswerValue) {
            correctAnswerValue.textContent = `${result.scorePercent}%`;
        }

        if (leaderboardList) {
            leaderboardList.innerHTML = "";

            leaderboard.forEach((player, index) => {
                const row = document.createElement("div");
                row.className = "leaderboard-item";
                if (index === 0) {
                    row.classList.add("first");
                }

                row.innerHTML = `
                    <div class="rank">
                        <span class="rank-number">${index + 1}</span>
                        <span class="rank-name">${player.name}${((currentPlayer?.userId && player.userId === currentPlayer.userId) || (!currentPlayer?.userId && player.name === (currentPlayer?.name || ''))) ? ' (Вы)' : ''}</span>
                    </div>
                    <span class="rank-score">${player.score} баллов</span>
                `;

                leaderboardList.appendChild(row);
            });
        }

        if (answerDetailsList) {
            answerDetailsList.innerHTML = "";

            result.results.forEach(item => {
                const points = item.correct ? 10 : 0;

                const row = document.createElement("div");
                row.className = "leaderboard-item";
                row.innerHTML = `
                    <div class="rank">
                        <span class="rank-number">${item.questionNumber}</span>
                        <span class="rank-name">${item.questionText}</span>
                    </div>
                    <span class="rank-score">${points}</span>
                `;

                answerDetailsList.appendChild(row);
            });
        }
    }

        submitBtn.addEventListener("click", submitCurrentAnswer);

        const profileCircle = document.querySelector('.profile');
        if (profileCircle) {
            profileCircle.style.cursor = 'pointer';
            profileCircle.addEventListener('click', function() {
                window.location.href = 'profile.html';
            });
        }
        const logoBtn = document.getElementById('logoBtn');
        if (logoBtn) {
            logoBtn.addEventListener('click', () => {
                window.location.href = 'index.html';
            });
        }
        loadQuiz();
    </script>
    <script type="module" src="js/header.js"></script>
</body>
</html>
