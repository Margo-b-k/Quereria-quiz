<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Регистрация</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Montserrat Alternates', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(90deg, #700143, #ffffff, #b04a75, #700143);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    background: #f3f3f3;
    padding: 40px;
    width: 380px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h1 {
    margin-bottom: 25px;
    font-weight: 600;
}

input {
    width: 100%;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 12px;
    border: none;
    background: #dcdcdc;
    font-size: 16px;
}

input:focus {
    outline: none;
    background: #cfcfcf;
}

.checkbox-container {
    display: flex;
    align-items: center;
    margin-bottom: 20px;
    cursor: pointer;
    font-size: 14px;
}

.checkbox {
    width: 35px;
    height: 24px;
    border-radius: 5px;
    background: #dcdcdc;
    margin-right: 10px;
    transition: 0.3s;
}

.checkbox.active {
    background: #700143;
}

button {
    width: 100%;
    padding: 15px;
    border-radius: 15px;
    border: none;
    background: #700143;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
    opacity: 0.5;
}

button.enabled {
    opacity: 1;
}

button:hover.enabled {
    background: #900257;
}

.bottom-text {
    margin-top: 20px;
    font-size: 14px;
}

.bottom-text a {
    color: #700143;
    text-decoration: none;
    font-weight: 600;
}

.bottom-text a:hover {
    text-decoration: underline;
}

.alert {
    display: none;
    margin-bottom: 15px;
    padding: 10px;
    background: #ffcccc;
    color: #700143;
    border-radius: 10px;
    font-size: 14px;
}
</style>
</head>
<body>

<div class="container">
    <h1>Регистрация</h1>

    <div class="alert" id="alertBox">Заполните все поля</div>

    <input type="text" id="name" placeholder="ФИ">
    <input type="text" id="email" placeholder="E-mail">
    <input type="password" id="password" placeholder="Пароль">

    <div class="checkbox-container" id="checkboxContainer">
        <div class="checkbox" id="checkbox"></div>
        <span>Я принимаю условия пользовательского соглашения</span>
    </div>

    <button id="submitBtn" disabled>Присоединиться</button>

    <div class="bottom-text">
        Уже есть аккаунт? <a href="login.html">Войти</a>
    </div>
</div>

<script>
const nameInput = document.getElementById('name');
const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');
const checkbox = document.getElementById('checkbox');
const checkboxContainer = document.getElementById('checkboxContainer');
const submitBtn = document.getElementById('submitBtn');
const alertBox = document.getElementById('alertBox');

let isChecked = false;

// Переключение чекбокса
checkboxContainer.addEventListener('click', () => {
    isChecked = !isChecked;
    checkbox.classList.toggle('active');
    checkForm();
});

// Проверка email на наличие "@"
emailInput.addEventListener('input', () => {
    if (!emailInput.value.includes('@')) {
        emailInput.style.border = "2px solid red";
    } else {
        emailInput.style.border = "none";
    }
    checkForm();
});

// Проверка заполнения формы
function checkForm() {
    if (
        nameInput.value.trim() !== "" &&
        emailInput.value.trim() !== "" &&
        passwordInput.value.trim() !== "" &&
        emailInput.value.includes('@') &&
        isChecked
    ) {
        submitBtn.disabled = false;
        submitBtn.classList.add('enabled');
    } else {
        submitBtn.disabled = true;
        submitBtn.classList.remove('enabled');
    }
}

nameInput.addEventListener('input', checkForm);
passwordInput.addEventListener('input', checkForm);

submitBtn.addEventListener('click', async () => {
    if (submitBtn.disabled) {
        alertBox.style.display = "block";
        alertBox.textContent = "Заполните все поля корректно";
        setTimeout(() => {
            alertBox.style.display = "none";
        }, 2000);
        return;
    }

    try {
    const response = await fetch('/api/auth/register', {
    method: 'POST',
    headers: {
        'Content-Type': 'application/json'
    },
    credentials: 'include',
    body: JSON.stringify({
        name: nameInput.value.trim(),
        email: emailInput.value.trim(),
        password: passwordInput.value.trim()
    })
});

        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.message || data.error || 'Ошибка регистрации');
        }

        alert("Регистрация успешна!");

        nameInput.value = "";
        emailInput.value = "";
        passwordInput.value = "";
        isChecked = false;
        checkbox.classList.remove('active');
        checkForm();

        window.location.href = 'mainpage.html';
    } catch (error) {
        alertBox.style.display = "block";
        alertBox.textContent = error.message || "Ошибка регистрации";

        setTimeout(() => {
            alertBox.style.display = "none";
        }, 3000);
    }
});
</script>
<script type="module" src="js/header.js"></script>
</body>
</html>
