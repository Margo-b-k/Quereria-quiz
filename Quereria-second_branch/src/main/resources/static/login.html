<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat Alternates', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(90deg, #700143, #ffffff, #b04a75, #700143);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: #f3f3f3;
            padding: 40px;
            width: 380px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            margin-bottom: 25px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: none;
            background: #dcdcdc;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            background: #cfcfcf;
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: none;
            background: #700143;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        .bottom-text {
            margin-top: 20px;
            font-size: 14px;
        }

        .bottom-text a {
            color: #700143;
            text-decoration: none;
            font-weight: 600;
        }

        .alert {
            display: none;
            margin-bottom: 15px;
            padding: 10px;
            background: #ffcccc;
            color: #700143;
            border-radius: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Вход</h1>

    <div class="alert" id="alertBox"></div>

    <input type="text" id="email" placeholder="E-mail">
    <input type="password" id="password" placeholder="Пароль">

    <button id="loginBtn">Войти</button>

    <div class="bottom-text">
        Нет аккаунта? <a href="registration.html">Зарегистрироваться</a>
    </div>
</div>

<script>
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const alertBox = document.getElementById('alertBox');

    loginBtn.addEventListener('click', async () => {
        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                credentials: 'include',
                body: JSON.stringify({
                    email: emailInput.value.trim(),
                    password: passwordInput.value.trim()
                })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.message || data.error || 'Ошибка входа');
            }

            window.location.href = 'mainpage.html';
        } catch (error) {
            alertBox.style.display = 'block';
            alertBox.textContent = error.message || 'Ошибка входа';
        }
    });
</script>
<script type="module" src="js/header.js"></script>
</body>
</html>
