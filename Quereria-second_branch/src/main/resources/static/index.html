<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>

    <link rel="stylesheet" href="style.css">
    

    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rufina:wght@700&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
    <div class="left-block">
        <div class="logo">Q</div>

        <button class="burger" id="burger" type="button" aria-label="Открыть меню">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>

    <nav class="menu" id="menu">
        <a href="mainpage.html" class="menu-item" data-page="mainpage.html">Главная</a>
        <a href="history.html" class="menu-item" data-page="history.html">История</a>
        <a href="index.html" class="menu-item" data-page="create.html">Создание</a>
        <a href="help.html" class="menu-item" data-page="help.html">Помощь</a>
    </nav>

    <a href="profile.html" class="profile" id="profileBtn" aria-label="Профиль"></a>
</header>

<main class="container">
    <section class="hero">
        <a href="create.html" class="primary-btn">
            Создать квиз
        </a>
    </section>

    <section class="recent">
        <h2>Недавно созданные квизы:</h2>

        <div id="quiz-container" class="quiz-list">
            <div class="quiz-card">
                <div class="quiz-image" style="background-image:url('img/music.png')"></div>
                <div class="quiz-content">
                    <div class="quiz-title">Мой первый квиз</div>
                    <div class="quiz-meta">1 вопрос • 15 секунд</div>
                </div>
            </div>
        </div>
    </section>
</main>

<script type="module" src="js/main.js"></script>
<script type="module" src="js/header.js"></script>
</body>
</html>
