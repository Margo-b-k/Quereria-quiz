<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Создание квиза</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Rufina:wght@700&display=swap" rel="stylesheet">
</head>

<body>

<header class="header">
  <div class="left-block">
    <div class="logo">Q</div>
    <div class="burger" id="burger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>

  <nav class="menu" id="menu">
    <a href="mainpage.html" class="menu-item" data-page="mainpage.html">Главная</a>
    <a href="history.html" class="menu-item" data-page="history.html">История</a>
    <a href="index.html" class="menu-item" data-page="index.html">Создание</a>
    <a href="help.html" class="menu-item" data-page="help.html">Помощь</a>
  </nav>

  <div href="profile.html" class="profile" id="profileBtn"></div>
</header>


<main class="container">

  <!-- вкладки -->
  <div class="section-tabs">
    <span class="tab active">Оформление</span>
    <span class="tab">Обложка</span>
  </div>


  <!-- название -->
  <div class="form-group">

    <label for="quiz-title">Название:</label>

    <input
      type="text"
      id="quiz-title"
      placeholder="Введите текст"
    >

  </div>


  <!-- описание -->
  <div class="form-group">

    <label for="quiz-description">Описание:</label>

    <textarea
      id="quiz-description"
      placeholder="Введите описание"
    ></textarea>

  </div>


  <!-- тип квиза -->
  <div class="form-group">

    <label>Вид квиза:</label>

    <div class="checkbox-group">

      <label>
        <input type="checkbox" value="test">
        Тест
      </label>

      <label>
        <input type="checkbox" value="quiz">
        Викторина
      </label>

      <label>
        <input type="checkbox" value="fun">
        Развлекательный
      </label>

    </div>

  </div>


  <!-- обложка -->
  <div class="form-group">

    <label for="cover-input">Обложка:</label>

    <input type="file" id="cover-input" hidden>

  <div class="cover-icons">
    <div class="icon-btn" id="coverUploadBtn">
      <img src="img/collections.png" class="icon" alt="">
    </div>

    <div class="icon-btn" id="removeCoverBtn">
      <img src="img/Trash.png" class="icon" alt="">
    </div>
  </div>

    <div class="cover-preview"></div>

  </div>


  <!-- ===== БЛОК ВОПРОСОВ ===== -->

  <section class="questions-section">

    <div class="questions-header">
      <h3>Вопросы</h3>
    </div>


    <!-- сюда JS добавляет вопросы -->
    <div id="questions-container"></div>


    <div class="question-controls">

        <button id="add-question-btn" class="add-btn">
          <span class="plus">＋</span>
          Добавить вопрос
        </button>

      <button
        id="finish-btn"
        class="finish-btn"
      >
        Завершить
      </button>

    </div>

  </section>


</main>


<script type="module" src="js/create.js"></script>
<script type="module" src="js/header.js"></script>
</body>
</html>
